<!DOCTYPE html>
<html lang="pt-BR">
<link rel="stylesheet" href="./css/main.css"> <!-- CSS -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title> 

</head>

<body>
    <div class="container">
        <h1>Cadastro</h1>

        <form id="formCadastro"> <!-- Form do Cadastro -->
            <input id="nome" placeholder="Nome completo"> <!-- Campo Nome -->
            <input id="email" placeholder="Email"> <!-- Campo Email-->
            <input id="telefone" placeholder="+55 Telefone"> <!-- Campo Telefone-->
            <input id="cpf" placeholder="CPF">
            <input type="date" id="dataNascimento">
            <button type="submit">Enviar Cadastro</button> <!-- Enviar Dados para o JS.-->

            <p id="mensagem"></p> <!-- Placeholder de Mensagens-->
        </form>
    </div>

    <script src="./js/main.js"></script> <!-- Main.js-->
    <div class="corner-link">
    <a href="https://github.com/xNeohaha/Desen-Web-2">Visitar Repositório</a> <!-- Repositorio caso algo de errado. -->
</div>
</body>

</html>
